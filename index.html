<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avaliação Clínica – Farmacologia</title>
<style>

  .body{padding:32px 36px}
  h1{font-family:'Playfair Display',serif;font-size:30px;color:#1e293b;margin-bottom:8px}
  .subtitle{color:#64748b;font-size:15px;margin-bottom:32px;line-height:1.6}
  label.field-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;letter-spacing:.3px;text-transform:uppercase}

  .btn-primary:hover{opacity:.9}
  .btn-primary:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
  .error{color:#ef4444;font-size:13px;margin-top:6px}
  .progress-bar-wrap{margin-bottom:24px}
  .progress-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
  .progress-track{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#0ea5e9,#6366f1);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

  .alt-btn.correct{border-color:#22c55e;background:#f0fdf4;color:#166534;cursor:default}
  .alt-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b;cursor:default}
  .alt-btn.dimmed{border-color:#e2e8f0;color:#94a3b8;cursor:default}
  .letra{min-width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;background:#f1f5f9;color:#64748b}

  .letra.wrong{background:#ef4444;color:white}
  .letra.dimmed{background:#f1f5f9;color:#cbd5e1}

  .actions{margin-top:24px}
  .score-wrap{text-align:center;padding:40px 0 20px}
  .score-emoji{font-size:64px;margin-bottom:16px}
  .score-title{font-family:'Playfair Display',serif;font-size:28px;color:#1e293b;margin-bottom:8px}
  .score-sub{color:#64748b;font-size:15px;margin-bottom:24px}

// Hash numérico simples e determinístico
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function hashName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return hash % CASOS.length;
}

function nameToSeed(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return h;
}

// Embaralha array usando seed determinística
function shuffleWithSeed(arr, seed) {
  const rand = seededRand(seed);
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Retorna as alternativas embaralhadas e qual letra ficou com o gabarito original
function getShuffledAlts(questao, seed) {
  const letrasOriginais = ['A','B','C','D'];
  const letrasDisplay = ['A','B','C','D'];
  // Embaralha as letras originais
  const ordemEmbaralhada = shuffleWithSeed(letrasOriginais, seed);
  // Monta mapa: letra exibida -> conteúdo original
  const alts = {};
  let novoGabarito = '';
  ordemEmbaralhada.forEach((letraOrig, i) => {
    const letraDisplay = letrasDisplay[i];
    alts[letraDisplay] = questao.alternativas[letraOrig];
    if (letraOrig === questao.gabarito) novoGabarito = letraDisplay;
  });
  return { alts, gabarito: novoGabarito };
}

let state = {
  screen: 'login',
  nome: '',
  casoIdx: 0,
  seed: 0,
  qIdx: 0,
  selected: null,
  revealed: false,
  score: 0,
  answers: [],
  saveStatus: 'idle',
  shuffledQuestoes: []  // cache das questões embaralhadas
};

function buildShuffledQuestoes(casoIdx, seed) {
  const caso = CASOS[casoIdx];
  return caso.questoes.map((q, i) => {
    const qSeed = (seed + i * 7919) >>> 0;
    return getShuffledAlts(q, qSeed);
  });
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'login') app.innerHTML = renderLogin();
  else if (state.screen === 'quiz') app.innerHTML = renderQuiz();
  else app.innerHTML = renderScore();
  bindEvents();
}

function renderLogin() {
  return `
    <h1>Bem-vindo(a)!</h1>
    <p class="subtitle">Digite seu nome completo para acessar seu caso clínico exclusivo com 5 questões de múltipla escolha.</p>
    <div style="margin-bottom:12px">
      <label class="field-label">Nome completo</label>
      <input type="text" id="nome-input" placeholder="Ex: Maria Silva Santos" autocomplete="name"/>
      <div class="error" id="login-error"></div>
    </div>
    <button class="btn-primary" id="btn-login">Acessar meu caso →</button>
    <p class="hint">Cada aluno recebe um caso único gerado a partir do seu nome.</p>
  `;
}

function renderQuiz() {
  const caso = CASOS[state.casoIdx];
  const q = caso.questoes[state.qIdx];
  const shuffled = state.shuffledQuestoes[state.qIdx];
  const pct = Math.round(((state.qIdx + 1) / 5) * 100);
  const letras = ['A','B','C','D'];

  let alts = letras.map(l => {
    let cls = 'alt-btn';
    let letraCls = 'letra';
    let mark = '';
    if (!state.revealed) {
      if (state.selected === l) { cls += ' selected'; letraCls += ' selected'; }
    } else {
      if (l === shuffled.gabarito) { cls += ' correct'; letraCls += ' correct'; mark = '<span class="alt-mark">✓</span>'; }
      else if (l === state.selected) { cls += ' wrong'; letraCls += ' wrong'; mark = '<span class="alt-mark">✗</span>'; }
      else { cls += ' dimmed'; letraCls += ' dimmed'; }
    }
    return `<button class="${cls}" data-letra="${l}">
      <span class="${letraCls}">${l}</span>
      <span class="alt-text">${shuffled.alts[l]}</span>
      ${mark}
    </button>`;
  }).join('');

  let feedback = '';
  if (state.revealed) {
    const ok = state.selected === shuffled.gabarito;
    feedback = `<div class="feedback ${ok ? 'correct' : 'wrong'}">
      <span style="font-size:20px">${ok ? '🎉' : '💡'}</span>
      <span>${ok ? 'Correto! Muito bem.' : `Incorreto. A resposta correta é a alternativa ${shuffled.gabarito}: ${shuffled.alts[shuffled.gabarito]}`}</span>
    </div>`;
  }

  let actionBtn = state.revealed
    ? `<button class="btn-primary" id="btn-next">${state.qIdx < 4 ? 'Próxima questão →' : 'Ver resultado →'}</button>`
    : `<button class="btn-primary" id="btn-confirm" ${state.selected ? '' : 'disabled'}>Confirmar resposta</button>`;

  let contextHtml = '';
  if (state.qIdx === 0) {
    contextHtml = `<div class="case-context">
      <div class="context-label">📋 Contexto do Caso</div>
      ${caso.caso}
    </div>`;
  }

  return `
    <div class="top-row">
      <div>
        <div class="student-label">Aluno(a)</div>
        <div class="student-name">${state.nome}</div>
      </div>
      <div class="case-badge">Caso #${state.casoIdx + 1}</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span style="color:#64748b">Questão ${state.qIdx + 1} de 5</span>
        <span style="color:#0ea5e9;font-weight:700">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${contextHtml}
    <div class="question-box">
      <div class="question-num">Questão ${state.qIdx + 1}</div>
      <div class="question-text">${q.enunciado}</div>
    </div>
    <div id="alts">${alts}</div>
    <div class="error" id="quiz-error"></div>
    ${feedback}
    <div class="actions">${actionBtn}</div>
  `;
}

function renderScore() {
  const pct = Math.round((state.score / 5) * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 80 ? '🎯' : pct >= 60 ? '📚' : '💪';
  let statusHtml = '';
  if (state.saveStatus === 'saving') {
    statusHtml = `<div class="save-loading"><span class="spinner"></span> Salvando resultado...</div>`;
  } else if (state.saveStatus === 'ok') {
    statusHtml = `<div class="save-ok">✅ Resultado salvo na planilha com sucesso!</div>`;
  } else if (state.saveStatus === 'error') {
    statusHtml = `<div class="save-err">⚠️ Não foi possível salvar automaticamente.</div>`;
  }
  return `
    <div class="score-wrap">
      <div class="score-emoji">${emoji}</div>
      <h2 class="score-title">Resultado Final</h2>
      <p class="score-sub">Parabéns, <strong>${state.nome}</strong>!</p>
      <div class="score-badge">
        <span class="score-num">${state.score}/5</span>
        <span class="score-pct">acertos · ${pct}%</span>
      </div>
      <div class="save-status">${statusHtml}</div>
      <button class="btn-restart" id="btn-restart">Recomeçar</button>
    </div>
  `;
}

function bindEvents() {
  if (state.screen === 'login') {
    const inp = document.getElementById('nome-input');
    inp && inp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

      btn.addEventListener('click', () => {
        if (state.revealed) return;
        state.selected = btn.dataset.letra;
        document.getElementById('quiz-error').textContent = '';
        render();
      });
    });
    document.getElementById('btn-confirm') && document.getElementById('btn-confirm').addEventListener('click', doReveal);
    document.getElementById('btn-next') && document.getElementById('btn-next').addEventListener('click', doNext);
  }
  if (state.screen === 'score') {
    document.getElementById('btn-restart') && document.getElementById('btn-restart').addEventListener('click', () => {
      state = { screen:'login', nome:'', casoIdx:0, seed:0, qIdx:0, selected:null, revealed:false, score:0, answers:[], saveStatus:'idle', shuffledQuestoes:[] };
      render();
    });
  }
}

function doLogin() {
  const val = document.getElementById('nome-input').value.trim();
  if (val.length < 3) { document.getElementById('login-error').textContent = 'Por favor, digite seu nome completo.'; return; }
  const seed = nameToSeed(val.toLowerCase());
  state.nome = val;
  state.casoIdx = hashName(val.toLowerCase());
  state.seed = seed;
  state.shuffledQuestoes = buildShuffledQuestoes(state.casoIdx, seed);
  state.screen = 'quiz';
  state.qIdx = 0; state.selected = null; state.revealed = false;
  state.score = 0; state.answers = []; state.saveStatus = 'idle';
  render();
}

function doReveal() {
  if (!state.selected) { document.getElementById('quiz-error').textContent = 'Selecione uma alternativa antes de confirmar.'; return; }
  state.revealed = true;
  const shuffled = state.shuffledQuestoes[state.qIdx];
  const correct = state.selected === shuffled.gabarito;
  state.answers.push({ selected: state.selected, correct, gabarito: shuffled.gabarito });
  if (correct) state.score++;
  render();
}

function doNext() {
  if (state.qIdx < 4) {
    state.qIdx++;
    state.selected = null;
    state.revealed = false;
    render();
  } else {
    state.screen = 'score';
    state.saveStatus = 'saving';
    render();
    saveToSheets();
  }
}

function saveToSheets() {
  const label = (a) => a ? (a.selected + (a.correct ? ' ✓' : ' ✗')) : '-';
  const caso = CASOS[state.casoIdx];
  const params = new URLSearchParams({
    nome: state.nome,
    casoNum: String(state.casoIdx + 1),
    casoTema: caso.caso.substring(0, 60) + '...',
    score: state.score + '/5',
    q1: label(state.answers[0]),
    q2: label(state.answers[1]),
    q3: label(state.answers[2]),
    q4: label(state.answers[3]),
    q5: label(state.answers[4]),
  });

  fetch(SHEETS_URL + '?' + params.toString(), { mode: 'no-cors' })
    .then(() => { state.saveStatus = 'ok'; render(); })
    .catch(() => { state.saveStatus = 'error'; render(); });
}

render();
</script>
</body>
